<h2>Voter Registration</h2>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Register</button>
</form>

{% for field in form %}
    {% for error in field.errors %}
        <p style="color:red;">{{ error }}</p>
    {% endfor %}
{% endfor %}

{% for error in form.non_field_errors %}
    <p style="color:red;">{{ error }}</p>
{% endfor %}
